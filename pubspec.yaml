name: avafit
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  http: ^1.2.0
  http_parser: ^4.0.2
  webview_flutter: ^4.4.2
  path_provider: ^2.1.1
  share_plus: ^7.2.1

  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  firebase_storage: ^12.4.10
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logos/
    - assets/images/icons/
    - assets/images/brands/
    - assets/images/products/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/app_icon.png"
  min_sdk_android: 21
